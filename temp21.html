<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: rgb(244, 238, 238);
        }
    .box {
    width: 400px;
    border: 1px solid gray;
    border-radius: 20px;
    padding: 20px;
    margin: 20px;
    background-color: white;
    }
    input{
    width: 150px;
    padding: 10px;
    border: 2px solid #eee8e8;
    border-radius: 5px;
    font-size: 16px;
    }

    </style>
</head>

<body>
    <center>
        
    <img src="assets/images/fb.png" width="180px" height="40px">
    <div class="box">
        <h3><b>Create a new account</b></h3>
        <h6>Its's quick and easy.</h6>
        <hr>

    <input type="text" placeholder="First name">
    <input type="text" placeholder="Surname"><br>
    <p>Date of birth:<input type="date"></p>
    <div>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other
    </div>
    <p><input type="text" placeholder="Mobile number of email address"></p><br>
    <input type="text" placeholder="New password"><br>
    <p><button>Sign Up</button></p>
    </div>
    </center>
</body>
</html>
