<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #eeeeee;
      }
      .container {
        background-color: white;
        border-radius: 10px;
        padding: 10px;
        width: 400px;
        margin: auto;
      }
      .row {
        display: flex;
        justify-content: center;
      }
      .title {
        font-size: 30px;
        margin-top: 10px;
      }
      .header {
        font-size: 50px;
        color: rgb(14, 99, 226);
        font-weight: bold;
        font-family: verdana;
      }
      .caption {
        font-size: 15px;
        color: gray;
        text-align: center;
        margin-bottom: 5px;
      }
      input,
      select {
        width: 100%;
        margin: 5px;
        border-radius: 5px;
        padding: 5px;
        border: 1px solid gray;
      }
      button {
        color: white;
        background-color: rgb(45, 166, 45);
        font-size: 18px;
        padding: 10px;
        border-radius: 5px;
        width: 200px;
        border: none;
        margin: 5px;
      }
      .leftCaption {
        color: gray;
        margin-left: 5px;
        font-size: 10px;
      }
      .qMark {
        background-color: green;
        border-radius: 5px;
        color: white;
        padding-left: 5px;
        padding-right: 5px;
        margin: 2px;
      }
      .radioClass {
        border: 1px solid gray;
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin: 5px;
        border-radius: 5px;
        padding: 3px;
      }
    </style>
    
  </head>
  <body><center>
    <div class="header">facebook</div>
    </center>
    <br>
    <div class="container">
      <div class="row">
      </div>
      <div class="row">
        <div>
          <div class="title">Create a new account</div>
          <div class="caption">It's quick and easy.</div>
        </div>
      </div>
      <hr>
      <div class="row">
        <input type="text" placeholder="First name" />
        <input type="text" placeholder="Surname" />
      </div>
      <div class="row" style="justify-content: start">
        <div class="leftCaption">
          Date of Birth<span class="qMark"
            ><abbr title="Click for more information">?</abbr></span
          >
        </div>
      </div>
      <div class="row">
        <select id="day"></select>
        <select id="month"></select>
        <select id="year"></select>
      </div>
      <div class="row" style="justify-content: start">
        <div class="leftCaption">
          Gender<span class="qMark"
            ><abbr title="Click for more information">?</abbr></span
          >
        </div>
      </div>
      <div class="row">
        <div class="radioClass">
          <div><label> Female</label></div>
          <div><input type="radio" name="gender" /></div>
        </div>
        <div class="radioClass">
            <div><label> Male</label></div>
                <div><input type="radio" name="gender" /></div>
        </div>
        <div class="radioClass">
            <div><label> Custom</label></div>
            <div><input type="radio" name="gender" /></div>
        </div>
      </div>
      <div class="row">
        <input type="text" placeholder="Mobile number of email address">
    </div>
    <div class="row">
    <input type="text" placeholder="New password">
    </div>
    <center>
    <button>Sign Up</button>
    </center>
    <br>
    </div>
    <script>
        let str="";
        for(let i=1;i<=31;i++){
            str+=`<option>${i}</option>`;
        }
        day.innerHTML=str;
        str="";
        for(let i=1;i<=12;i++){
            str+=`<option>${i}</option>`;
        }
        month.innerHTML=str;
        str="";
        for(let i=1905;i<=2025;i++){
            str+=`<option>${i}</option>`;
        }
        year.innerHTML=str;
    </script>
  </body>
</html>
